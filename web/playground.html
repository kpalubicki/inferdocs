<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InferDocs Playground</title>
  <link rel="stylesheet" href="/static/playground.css">
</head>
<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-icon">&#x1F4C4;</div>
        <div class="logo-text">
          <h1>inferdocs</h1>
          <p>local Q&amp;A &amp; summarization</p>
        </div>
      </div>

      <!-- Upload -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">Upload</div>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept=".txt,.md,.pdf">
          <div class="upload-icon">&#x2191;</div>
          <p>Drop file or click to browse</p>
          <span>PDF &middot; TXT &middot; MD</span>
        </div>
        <div class="status-bar" id="uploadStatus"></div>
      </div>

      <!-- Documents -->
      <div class="sidebar-section-title" style="padding: 12px 16px 4px">Documents</div>
      <div class="docs-list-wrap" id="docsList">
        <p class="empty-docs">No documents yet</p>
      </div>

      <div class="sidebar-footer">
        <p>API: <a href="/docs" target="_blank">/docs</a> &middot; <a href="/redoc" target="_blank">/redoc</a></p>
        <p style="margin-top:4px">Powered by Ollama</p>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <!-- Top bar -->
      <div class="topbar">
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="ask">Ask</button>
          <button class="mode-tab" data-mode="summarize">Summarize</button>
          <button class="mode-tab" data-mode="history">History</button>
        </div>
        <div class="doc-indicator">
          <div class="doc-dot" id="docDot"></div>
          <span id="docIndicatorText">No document selected</span>
        </div>
      </div>

      <!-- Work area -->
      <div class="work-area">

        <!-- Ask mode -->
        <div id="askPanel">
          <div class="question-wrap">
            <textarea
              class="question-input"
              id="questionInput"
              rows="1"
              placeholder="Ask a question about the document&#x2026;"
            ></textarea>
            <button class="send-btn" id="sendBtn" title="Send (Enter)">&#x2192;</button>
          </div>
        </div>

        <!-- Summarize mode -->
        <div id="summarizePanel" style="display:none">
          <div class="summarize-options">
            <button class="style-btn active" data-style="brief">Brief</button>
            <button class="style-btn" data-style="detailed">Detailed</button>
            <button class="style-btn" data-style="custom">Custom</button>
            <span class="length-label">Max words:</span>
            <input class="length-input" type="number" id="maxLength" value="150" min="50" max="1000">
            <button class="run-btn" id="summarizeBtn">Summarize</button>
          </div>
        </div>

        <!-- History mode -->
        <div id="historyPanel" style="display:none">
          <div class="history-toolbar">
            <span class="history-count" id="historyCount"></span>
            <div class="history-actions">
              <button class="icon-btn" id="exportMdBtn" title="Download as Markdown">&#x2193; MD</button>
              <button class="icon-btn" id="exportJsonBtn" title="Download as JSON">&#x2193; JSON</button>
              <button class="icon-btn danger" id="clearHistoryBtn" title="Clear history">Clear</button>
            </div>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>

        <!-- Output (Ask + Summarize) -->
        <div class="output-card" id="outputCard">
          <div class="output-header">
            <div class="spinner" id="spinner"></div>
            <span class="output-label" id="outputLabel">Output</span>
            <button class="copy-btn" id="copyBtn" title="Copy to clipboard" style="display:none">Copy</button>
          </div>
          <div class="output-body" id="output">
            <span class="output-placeholder">Select a document and ask a question or run a summary.</span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="/static/playground.js"></script>
</body>
</html>
